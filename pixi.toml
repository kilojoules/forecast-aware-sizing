[project]
name = "battery_gym"
version = "0.1.0"
description = "Reproduction of Srinivasa et al. 2026 battery-fleet RL"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
test = "python tests/sanity.py"
test-priceenv = "python tests/test_price_env.py"
phase1 = "python phase1_benchmark.py"
run-small = "python run.py --B 2 3 --c 2 3 --d 2 3 --T 100000"
multi-seed = "python multi_seed.py"
elm-sweep = "python elm_sweep.py"

[dependencies]
python = "3.11.*"
numpy = ">=1.26,<2"
matplotlib = ">=3.8"
scipy = ">=1.13"
pandas = ">=2"
scikit-learn = ">=1.5"
requests = ">=2"

[pypi-dependencies]
fatpack = "==0.7.8"
cvxpy = ">=1.7"
# gridstatus is only used locally to pull ERCOT historical CSVs into
# data/ercot/. Not needed at runtime on LUMI; data is rsync'd in.
