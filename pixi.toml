[project]
name = "forecast-aware-sizing"
version = "0.1.0"
description = "Battery sizing under dispatch fidelity and imbalance-penalty regimes"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
test = "python tests/sanity.py"
test-priceenv = "python tests/test_price_env.py"
benchmark = "python sizing/paper_benchmark.py"
imbalance = "python sizing/paper_imbalance.py --year 2022 --out results/imbalance/dk1_2022.json"
figures = "python sizing/paper_stress_figures.py"
readme-figures = "python sizing/readme_figures.py"

[dependencies]
python = "3.11.*"
numpy = ">=1.26,<2"
matplotlib = ">=3.8"
scipy = ">=1.13"
pandas = ">=2"
scikit-learn = ">=1.5"
requests = ">=2"

[pypi-dependencies]
fatpack = "==0.7.8"
cvxpy = ">=1.7"
# gridstatus is only used locally to pull ERCOT historical CSVs into
# data/ercot/. Not needed at runtime on LUMI; data is rsync'd in.
